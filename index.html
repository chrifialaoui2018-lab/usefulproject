<!DOCTYPE html>
<html lang="fr">
<head>

<script>(function(s){s.dataset.zone='11245170',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<script src="https://quge5.com/88/tag.min.js" data-zone="256721" async data-cfasync="false"></script>    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de QR Code</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:2px solid #ccc;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#2196F3;
}

button{
    margin-top:15px;
    padding:12px 20px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#0b7dda;
}

#qrcode{
    margin-top:25px;
    display:flex;
    justify-content:center;
}

footer{
    margin-top:20px;
    color:#777;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<h1>QR Code Generator</h1>

<input
type="text"
id="text"
placeholder="Entrez un texte ou une URL">

<button onclick="generateQRCode()">
Générer le QR Code
</button>

<div id="qrcode"></div>

<footer>
HTML • CSS • JavaScript
</footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

function generateQRCode(){

    let text=document.getElementById("text").value;

    let qr=document.getElementById("qrcode");

    qr.innerHTML="";

    if(text.trim()==""){
        alert("Veuillez saisir un texte.");
        return;
    }

    new QRCode(qr,{
        text:text,
        width:250,
        height:250,
        colorDark:"#000000",
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.H
    });

}

</script>

</body>
</html>
